<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4A VPS Player</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #121212; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .container { display: flex; flex: 1; overflow: hidden; gap: 20px; }
        .playlist { flex: 2; background: #1e1e1e; border-radius: 8px; overflow-y: auto; border: 1px solid #333; }
        .track { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #2a2a2a; display: flex; flex-direction: column; transition: background 0.2s; }
        .track:hover { background: #2a2a2a; }
        .track.playing { background: #2b5c8f; border-left: 4px solid #5fa8ff; padding-left: 11px; }
        .track-name { font-weight: 600; font-size: 15px; }
        .track-path { font-size: 12px; color: #888; margin-top: 4px; }
        .playing .track-path { color: #b3d4ff; }
        .player-ui { flex: 1; background: #1e1e1e; padding: 30px; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border: 1px solid #333; }
        audio { width: 100%; margin-top: 25px; outline: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🎵 Server M4A Player</h2>
    </div>

    <div class="container">
        <div class="playlist" id="playlist">
            <div style="padding: 30px; text-align: center; color: #666;">
                Loading tracks from server...
            </div>
        </div>

        <div class="player-ui">
            <div style="font-size: 48px; margin-bottom: 15px;">💿</div>
            <h3 id="nowPlayingName" style="margin: 0 0 10px 0; word-break: break-word;">No track selected</h3>
            <p id="nowPlayingFolder" style="color: #888; font-size: 13px; margin: 0; word-break: break-word;">--</p>
            <audio id="audioPlayer" controls></audio>
        </div>
    </div>

    <script>
        const playlistEl = document.getElementById('playlist');
        const audioPlayer = document.getElementById('audioPlayer');
        const nowPlayingName = document.getElementById('nowPlayingName');
        const nowPlayingFolder = document.getElementById('nowPlayingFolder');

        let tracks = [];
        let currentIndex = -1;

        // Fetch the JSON list of files from the server
        fetch('tracks.json')
            .then(response => {
                if (!response.ok) throw new Error("Could not find tracks.json");
                return response.json();
            })
            .then(data => {
                tracks = data;
                renderPlaylist();
            })
            .catch(error => {
                playlistEl.innerHTML = `<div style="padding: 30px; text-align: center; color: #ff6b6b;">Error: Make sure you ran the Python script to generate tracks.json on your VPS.</div>`;
                console.error(error);
            });

        function renderPlaylist() {
            playlistEl.innerHTML = '';
            
            if (tracks.length === 0) {
                playlistEl.innerHTML = '<div style="padding: 30px; text-align: center; color: #666;">No M4A files found in tracks.json.</div>';
                return;
            }

            tracks.forEach((track, index) => {
                const trackEl = document.createElement('div');
                trackEl.className = 'track';
                trackEl.onclick = () => playTrack(index);

                trackEl.innerHTML = `
                    <div class="track-name">${track.name}</div>
                    <div class="track-path">📁 ${track.folder}</div>
                `;
                playlistEl.appendChild(trackEl);
            });
        }

        function playTrack(index) {
            // Remove highlight from previous track
            if (currentIndex !== -1 && playlistEl.children[currentIndex]) {
                playlistEl.children[currentIndex].classList.remove('playing');
            }

            currentIndex = index;
            const track = tracks[index];
            
            // Add highlight to new track
            const currentEl = playlistEl.children[currentIndex];
            currentEl.classList.add('playing');
            currentEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            // Set the audio source directly to the file path on the server
            // We use encodeURI to handle spaces or special characters in folder/file names
            audioPlayer.src = encodeURI(track.path.replace(/\\/g, '/')); 
            audioPlayer.play();

            // Update UI
            nowPlayingName.textContent = track.name;
            nowPlayingFolder.textContent = track.folder;
        }

        // Auto-play next song when current one finishes
        audioPlayer.addEventListener('ended', () => {
            if (currentIndex < tracks.length - 1) {
                playTrack(currentIndex + 1);
            }
        });
    </script>
</body>
</html>
